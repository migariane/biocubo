<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cube back faces -->
  <polygon points="60,30 140,30 140,110 60,110" fill="#1a3a5c" opacity="0.7"/>
  <polygon points="140,30 170,55 170,135 140,110" fill="#0d2a45" opacity="0.9"/>
  <polygon points="60,110 140,110 170,135 90,135" fill="#0a2038" opacity="0.85"/>

  <!-- Cube front face -->
  <polygon points="30,55 110,55 110,135 30,135" fill="#2563a8" opacity="0.95"/>
  <!-- Cube top face -->
  <polygon points="30,55 60,30 140,30 110,55" fill="#3b82c4"/>
  <!-- Cube right face -->
  <polygon points="110,55 140,30 170,55 140,80" fill="#1e4f8c"/>
  <!-- Cube right face lower -->
  <polygon points="110,55 140,80 170,55 170,135 140,110 110,135" fill="#1e4f8c" opacity="0.8"/>

  <!-- BIO text on front face -->
  <text x="70" y="105" font-family="Georgia, serif" font-size="38" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="1">BIO</text>

  <!-- Superscript 3 -->
  <text x="148" y="72" font-family="Georgia, serif" font-size="26" font-weight="bold"
        fill="#f0c040" text-anchor="middle">3</text>

  <!-- Small molecule dots -->
  <circle cx="42" cy="68" r="3" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="98" cy="62" r="2.5" fill="#7ec8e3" opacity="0.8"/>
  <circle cx="55" cy="128" r="3" fill="#7ec8e3" opacity="0.8"/>
  <line x1="42" y1="68" x2="55" y2="128" stroke="#7ec8e3" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="68" x2="98" y2="62" stroke="#7ec8e3" stroke-width="1" opacity="0.5"/>
</svg>
