<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <!-- UGR Shield simplified -->
  <rect x="10" y="10" width="55" height="80" rx="5" fill="#8b0000"/>
  <!-- Crown top -->
  <polygon points="10,18 22,10 32,18 42,10 52,18 65,10 65,18" fill="#c8a000"/>
  <!-- Shield inner decoration -->
  <rect x="18" y="22" width="39" height="30" rx="3" fill="#a00000"/>
  <text x="37" y="42" font-family="serif" font-size="16" font-weight="bold"
        fill="#f5d060" text-anchor="middle">UGR</text>
  <rect x="18" y="58" width="39" height="24" rx="2" fill="#c8a000" opacity="0.3"/>
  <text x="37" y="75" font-family="serif" font-size="9" fill="white" text-anchor="middle">1531</text>

  <!-- University name -->
  <text x="90" y="42" font-family="Georgia, serif" font-size="14" font-weight="bold"
        fill="#8b0000">Universidad</text>
  <text x="90" y="62" font-family="Georgia, serif" font-size="14" font-weight="bold"
        fill="#8b0000">de Granada</text>
</svg>
